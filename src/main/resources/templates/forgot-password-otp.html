<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khôi phục mật khẩu</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f4; padding: 20px;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                <tr>
                    <td style="background-color: #f39c12; padding: 20px; text-align: center; color: #ffffff;">
                        <h1 style="margin: 0; font-size: 24px;">Yêu cầu Khôi phục mật khẩu 🔐</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 30px; text-align: center; color: #333333;">
                        <p style="font-size: 16px; margin-bottom: 10px;">Xin chào <strong><span th:text="${email}"></span></strong>,</p>
                        <p style="font-size: 16px; margin-bottom: 30px;">Chúng tôi nhận được yêu cầu đặt lại mật khẩu cho tài khoản của bạn. Dưới đây là mã xác nhận (OTP) của bạn:</p>

                        <div style="background-color: #f8f9fa; border: 2px dashed #f39c12; border-radius: 8px; padding: 15px; margin: 0 auto; width: max-content;">
                            <h2 style="margin: 0; font-size: 32px; letter-spacing: 5px; color: #f39c12;" th:text="${otpCode}">123456</h2>
                        </div>

                        <p style="font-size: 14px; color: #777777; margin-top: 30px;">Mã xác nhận này sẽ hết hạn trong vòng <strong>5 phút</strong>.<br>Nếu bạn không yêu cầu đổi mật khẩu, vui lòng bỏ qua email này.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
