<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đăng ký</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f4; padding: 20px;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                <tr>
                    <td style="background-color: #ff6b6b; padding: 20px; text-align: center; color: #ffffff;">
                        <h1 style="margin: 0; font-size: 24px;">Chào mừng đến với FastBite! 🍔</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 30px; text-align: center; color: #333333;">
                        <p style="font-size: 16px; margin-bottom: 10px;">Xin chào <strong><span th:text="${email}"></span></strong>,</p>
                        <p style="font-size: 16px; margin-bottom: 30px;">Cảm ơn bạn đã đăng ký tài khoản. Để hoàn tất việc đăng ký, vui lòng nhập mã xác nhận (OTP) dưới đây:</p>

                        <div style="background-color: #f8f9fa; border: 2px dashed #ff6b6b; border-radius: 8px; padding: 15px; margin: 0 auto; width: max-content;">
                            <h2 style="margin: 0; font-size: 32px; letter-spacing: 5px; color: #ff6b6b;" th:text="${otpCode}">123456</h2>
                        </div>

                        <p style="font-size: 14px; color: #777777; margin-top: 30px;">Mã xác nhận này sẽ hết hạn trong vòng <strong>5 phút</strong>. Vui lòng không chia sẻ mã này cho bất kỳ ai.</p>
                    </td>
                </tr>
                <tr>
                    <td style="background-color: #f8f9fa; padding: 15px; text-align: center; font-size: 12px; color: #999999;">
                        <p style="margin: 0;">&copy; 2026 FastBite - Hệ thống Đặt đồ ăn tự động.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
