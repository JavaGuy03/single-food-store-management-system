server:
  port: 8080

spring:
  application:
    name: food-management-system

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # C-4 WARNING: Change to 'validate' or 'none' in production! Use Flyway/Liquibase for prod migrations.
      ddl-auto: update
    show-sql: false  # m-1: Disabled to prevent schema leaks and log noise in prod

  security:
    oauth2:
      resourceserver:
        jwt:
          jws-algorithms: HS512

  jackson:
    serialization:
      write-dates-as-timestamps: false

# LocalDateTime JSON: coi giá trị DB là giờ địa bàn này → xuất ISO có offset (+07:00) cho mobile (Flutter) parse ổn định
app:
  api:
    datetime-zone: Asia/Ho_Chi_Minh

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

zalo-pay:
  app-id: ${ZALOPAY_APP_ID}
  key1: ${ZALOPAY_KEY1}
  key2: ${ZALOPAY_KEY2}
  create-order-url: "https://sb-openapi.zalopay.vn/v2/create"
  order-status-url: "https://sb-openapi.zalopay.vn/v2/query"
  redirect-url: "http://localhost:5173/payment-result"
  # C-5 NOTE: ZaloPay callback cannot reach localhost. We use the polling cron job (every 2 min)
  # in PaymentService as the primary mechanism to confirm payments in dev.
  # In production, replace with your real public HTTPS URL and implement POST /zalopay/callback.
  callback-url: "http://localhost:8080/api/v1/payments/zalopay/callback"

openapi:
  service:
    url: ${SWAGGER_SERVER_URL:http://localhost:8080}

minio:
  url: http://minio:9000 
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: food-media

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900
  refresh-token-expiration: 604800
  refresh-token-remember-me-expiration: 2592000